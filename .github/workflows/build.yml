name: Build APK

# Builds the TickPatch LSPosed module APK. rosetta-xposed is consumed as a
# Gradle composite build, so CI checks it out as a sibling directory next to
# this repo before invoking Gradle.
# Fast debug-build gate for branch work. master is covered by release-apk.yml
# (it builds the minified release and publishes it on merge), so building debug
# here on every merge too would be redundant — run on PRs and on demand only.
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Supersede in-flight runs for the same ref so rapid pushes don't pile up.
concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Check this repo out into a subdirectory so rosetta-xposed can sit
      # beside it — settings.gradle.kts does includeBuild("../rosetta-xposed").
      - name: Check out TickPatch
        uses: actions/checkout@v5
        with:
          path: TickPatch

      # The Rosetta resolver library (composite build dependency). A change here
      # may need a matching rosetta-xposed change on a same-named branch (e.g. a
      # new API this module calls). So build against rosetta-xposed's branch of
      # the SAME name when it exists, else fall back to master — this keeps a
      # cross-repo PR green without a merge-order dance, and reverts to master
      # automatically once both land. If rosetta-xposed is PRIVATE, add a PAT with
      # repo read access as the ROSETTA_XPOSED_PAT secret.
      - name: Resolve rosetta-xposed ref (match this branch, else master)
        id: rref
        env:
          GH_TOKEN: ${{ secrets.ROSETTA_XPOSED_PAT || github.token }}
          CANDIDATE: ${{ github.head_ref || github.ref_name }}
        run: |
          if git ls-remote --exit-code --heads \
              "https://x-access-token:${GH_TOKEN}@github.com/Xiddoc/rosetta-xposed.git" \
              "$CANDIDATE" >/dev/null 2>&1; then
            echo "Using matching rosetta-xposed branch: $CANDIDATE"
            echo "ref=$CANDIDATE" >> "$GITHUB_OUTPUT"
          else
            echo "No matching rosetta-xposed branch; using master."
            echo "ref=master" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out rosetta-xposed (composite build)
        uses: actions/checkout@v5
        with:
          repository: Xiddoc/rosetta-xposed
          ref: ${{ steps.rref.outputs.ref }}
          path: rosetta-xposed
          token: ${{ secrets.ROSETTA_XPOSED_PAT || github.token }}

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      # ubuntu-latest ships the Android SDK preinstalled (ANDROID_HOME is set),
      # so no SDK provisioning step is needed.
      #
      # The TickTick maps are no longer committed: the io.github.xiddoc.rosetta.maps
      # plugin fetches them from rosetta-maps at build time (pinned ref) and the
      # plugin's schema-version gate validates them before bundling, so there is
      # no separate "validate committed JSON" step here. The fetch runs as part of
      # assembleDebug (wired into preBuild), so the runner needs network access to
      # rosetta-maps — available on GitHub-hosted runners under the default policy.
      - name: Build debug APK
        working-directory: TickPatch
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: tickpatch-debug-apk
          path: TickPatch/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
