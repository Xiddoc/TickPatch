name: Release APK

# Builds the MINIFIED R8 release APK of the TickPatch module and, on every merge
# to master, auto-bumps the version and publishes a GitHub Release with the APK.
#
#   * pull_request / manual run  → build the release APK and upload it as a
#     workflow artifact (a green gate that the minified build stays buildable).
#   * push to master             → bump the version, build, and publish a new
#     GitHub Release (tag `v<next>`) with the signed APK attached.
#
# Versioning is derived, never committed back (no bot-commit loop): the next
# versionName is the latest `v*` tag with its patch incremented (or 1.0.0 for the
# first release), and the versionCode is the monotonic workflow run number. Both
# are injected into Gradle via -P properties (see app/build.gradle.kts).
#
# `:app:assembleRelease` runs R8 (shrink + optimize + obfuscate) and signs with
# the debug keystore so the artifact is installable. rosetta-xposed is consumed
# as a Gradle composite build, so CI checks it out as a sibling directory.

# push + pull_request both fire for a PR-branch commit, double-running the build.
# Limit push to master (the release path); pull_request covers branch work —
# one run per commit.
on:
    push:
        branches: [master]
    pull_request:
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: release-apk-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:
        name: Build minified R8 release APK
        runs-on: ubuntu-latest
        outputs:
            tag: ${{ steps.ver.outputs.tag }}
            version: ${{ steps.ver.outputs.name }}
            publish: ${{ steps.ver.outputs.publish }}
        steps:
            # Check this repo out into a subdirectory so rosetta-xposed can sit
            # beside it — settings.gradle.kts does includeBuild("../rosetta-xposed").
            # fetch-depth: 0 so the version bump can read existing v* tags.
            - name: Check out TickPatch
              uses: actions/checkout@v5
              with:
                  path: TickPatch
                  fetch-depth: 0

            # The Rosetta resolver library (composite build dependency). Pinned to
            # master. If rosetta-xposed is PRIVATE, add a PAT with repo read access
            # as the ROSETTA_XPOSED_PAT secret; for a public repo the default token
            # works.
            - name: Check out rosetta-xposed (composite build)
              uses: actions/checkout@v5
              with:
                  repository: Xiddoc/rosetta-xposed
                  ref: master
                  path: rosetta-xposed
                  token: ${{ secrets.ROSETTA_XPOSED_PAT || github.token }}

            # Decide the version to stamp. On a master push we publish, so bump
            # the patch of the latest v* tag (or start at 1.0.0). Otherwise this
            # is a gate build — use a placeholder name and never publish.
            - name: Determine version
              id: ver
              working-directory: TickPatch
              run: |
                  set -euo pipefail
                  if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/master" ]; then
                      latest="$(git tag -l 'v*' --sort=-v:refname | head -n1)"
                      if [ -z "$latest" ]; then
                          name="1.0.0"
                      else
                          v="${latest#v}"
                          IFS=. read -r major minor patch <<< "$v"
                          name="${major}.${minor}.$((patch + 1))"
                      fi
                      publish=true
                  else
                      name="0.0.0-ci"
                      publish=false
                  fi
                  echo "name=$name"               >> "$GITHUB_OUTPUT"
                  echo "tag=v$name"               >> "$GITHUB_OUTPUT"
                  echo "code=${{ github.run_number }}" >> "$GITHUB_OUTPUT"
                  echo "publish=$publish"         >> "$GITHUB_OUTPUT"
                  echo "Stamping version $name (code ${{ github.run_number }}), publish=$publish"

            - name: Set up JDK 17
              uses: actions/setup-java@v5
              with:
                  distribution: temurin
                  java-version: "17"

            - name: Set up Gradle
              uses: gradle/actions/setup-gradle@v5

            # ubuntu-latest ships the Android SDK preinstalled (ANDROID_HOME set),
            # so no SDK provisioning step is needed.
            - name: Assemble minified R8 release APK
              working-directory: TickPatch
              run: |
                  ./gradlew :app:assembleRelease \
                      -PtickpatchVersionName="${{ steps.ver.outputs.name }}" \
                      -PtickpatchVersionCode="${{ steps.ver.outputs.code }}" \
                      --no-daemon --stacktrace

            - name: Locate release APK
              id: apk
              run: |
                  set -euo pipefail
                  APK="$(find TickPatch/app/build/outputs/apk/release -name '*.apk' | head -1)"
                  if [ -z "$APK" ]; then
                      echo "::error::No release APK produced." >&2
                      exit 1
                  fi
                  echo "Built: $APK"
                  echo "path=$APK" >> "$GITHUB_OUTPUT"

            - name: Upload release APK artifact
              uses: actions/upload-artifact@v6
              with:
                  name: tickpatch-release-apk
                  path: ${{ steps.apk.outputs.path }}
                  if-no-files-found: error
                  retention-days: 30

    # master-only: tag + publish the built APK as a GitHub Release. Isolated so
    # its `contents: write` scope never applies to PR/branch build runs. Creating
    # the release via the API also creates the tag, so there is no tag-push event
    # to loop back into this workflow.
    release:
        name: Publish GitHub Release
        needs: build
        if: needs.build.outputs.publish == 'true'
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Download built APK
              uses: actions/download-artifact@v7
              with:
                  name: tickpatch-release-apk
                  path: dist

            - name: Create release and attach APK
              env:
                  GH_TOKEN: ${{ github.token }}
                  TAG: ${{ needs.build.outputs.tag }}
              run: |
                  set -euo pipefail
                  APK="$(find dist -name '*.apk' | head -1)"
                  gh release create "$TAG" "$APK" \
                      --repo "${GITHUB_REPOSITORY}" \
                      --target "${GITHUB_SHA}" \
                      --title "$TAG" \
                      --generate-notes
