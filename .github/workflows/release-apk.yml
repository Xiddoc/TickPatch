name: Release APK

# Builds the MINIFIED R8 release APK of the TickPatch module.
#
#   * push / PR / manual run  → build the release APK and upload it as a
#     workflow artifact (a green gate that the minified build stays buildable).
#   * pushing a `v*` tag       → additionally attach the APK to a GitHub Release.
#
# `./gradlew :app:assembleRelease` runs R8 (shrink + optimize + obfuscate, per
# app/build.gradle.kts) and signs with the debug keystore so the artifact is
# installable. ubuntu-latest ships the Android SDK preinstalled (ANDROID_HOME
# set), so no SDK-setup step is needed.
#
# Only first-party `actions/*` are used in the build gate, and the gate runs
# with a read-only token — so it cannot trip an Actions allow-list policy or a
# write-scope cap. The tag-only Release job (which needs `contents: write`) is
# isolated and uses the preinstalled `gh` CLI rather than a third-party action.

on:
    push:
        branches: [master]
        tags: ['v*']
    pull_request:
        branches: [master]
    workflow_dispatch: {}

permissions:
    contents: read

concurrency:
    group: release-apk-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:
        name: Build minified R8 release APK
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            # AGP requires JDK 17; cache the Gradle home via the first-party action.
            - name: Set up JDK 17
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: '17'
                  cache: gradle

            - name: Assemble minified R8 release APK
              run: |
                  chmod +x ./gradlew
                  ./gradlew :app:assembleRelease --stacktrace

            # Resolve the produced APK path and expose it to later steps.
            - name: Locate release APK
              id: apk
              run: |
                  set -euo pipefail
                  APK="$(find app/build/outputs/apk/release -name '*.apk' | head -1)"
                  if [ -z "$APK" ]; then
                      echo "::error::No release APK produced." >&2
                      exit 1
                  fi
                  echo "Built: $APK"
                  echo "path=$APK" >> "$GITHUB_OUTPUT"

            - name: Upload release APK artifact
              uses: actions/upload-artifact@v4
              with:
                  name: tickpatch-release-apk
                  path: ${{ steps.apk.outputs.path }}
                  retention-days: 30

    # Tag-only: publish the built APK as a GitHub Release asset. Isolated from
    # the build gate so its `contents: write` scope never applies to PR runs.
    release:
        name: Publish GitHub Release
        needs: build
        if: startsWith(github.ref, 'refs/tags/v')
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Download built APK
              uses: actions/download-artifact@v4
              with:
                  name: tickpatch-release-apk
                  path: dist

            - name: Create release and attach APK
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  set -euo pipefail
                  APK="$(find dist -name '*.apk' | head -1)"
                  gh release create "${GITHUB_REF_NAME}" "$APK" \
                      --repo "${GITHUB_REPOSITORY}" \
                      --title "${GITHUB_REF_NAME}" \
                      --generate-notes
